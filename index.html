<!DOCTYPE html>
<html>
<head>
  <title>My Magazine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      /* Background autofill */
      background: url("background.jpg") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 60vw;              /* responsive A4 scaling */
      max-width: 500px;         /* keeps it small enough */
      aspect-ratio: 1 / 1.414;  /* A4 ratio */
      background: white;
      margin: 40px 0;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      border-radius: 6px;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .button-container {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .button-container button,
    .button-container a {
      padding: 8px 16px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .button-container button:hover,
    .button-container a:hover {
      background: #e63950;
    }

    audio {
      display: none;
    }

    @media (max-width: 600px) {
      .page {
        width: 85vw;
      }
    }
  </style>
</head>

<body>

  <!-- PAGE 1 -->
  <div class="page">
    <img src="page1.jpg">
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <img src="page2.jpg">
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <img src="page3.jpg">
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <img src="page4.jpg">
    <div class="button-container">
      <a href="https://open.spotify.com/" target="_blank">
        Songs that remind me of you
      </a>
    </div>
  </div>

  <!-- PAGE 5 -->
  <div class="page">
    <img src="page4.jpg"> <!-- reuse page4 or replace with page5 image if you want -->

    <div class="button-container">
      <button onclick="playVoice()">Message For You</button>

      <a href="https://example.com/bouquet" target="_blank">
        Bouquet For You
      </a>

      <a href="https://example.com/cake" target="_blank">
        Cake For You
      </a>
    </div>

    <audio id="voiceNote">
      <source src="voicenote.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    function playVoice() {
      document.getElementById("voiceNote").play();
    }
  </script>

</body>
</html>
